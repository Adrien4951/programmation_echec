<!DOCTYPE html>
<html>
<head>
    <title>Diagnostic I2C - Adrien & Léni</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .controls { background: #1e1e1e; padding: 20px; border-bottom: 2px solid #3498db; }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2ecc71; }
        .offline { background-color: #e74c3c; }
        select, button { padding: 10px; border-radius: 5px; border: none; cursor: pointer; margin: 5px; }
        .btn-connect { background: #2ecc71; color: white; }
        .btn-disconnect { background: #e74c3c; color: white; }
        .btn-scan { background: #3498db; color: white; font-weight: bold; padding: 15px 30px; }
        .container { padding: 30px; max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 15px; text-align: center; }
        th { background: #3498db; color: white; }
        tr:hover { background: #2c3e50; }
        .address-found { color: #f1c40f; font-weight: bold; font-family: monospace; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin-top:0;">OFFSET des capteurs A31301</h2>
        <div id="statusLabel" style="margin-bottom: 15px;">
            <span class="status-dot offline"></span>Déconnecté
        </div>
        
        <select id="portSelect">
            {% for port in ports %}<option value="{{ port }}">{{ port }}</option>{% endfor %}
        </select>
        
        <button class="btn-connect" onclick="connect()">Se connecter</button>
        <button class="btn-disconnect" onclick="disconnect()">Déconnecter</button>
    </div>

    <div class="container">
        <button id="scanBtn" class="btn-scan" onclick="startScan()" disabled>LANCER L'OFFSET</button>
        <h4 style="margin-top:0;">Attention vérifier aucune piece est sur le palteau</h4>
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Numéro</th>
                    <th>Adresse Détectée</th>
                    <th>Statut Matériel</th>
                </tr>
            </thead>
            <tbody id="i2cBody">
                <tr><td colspan="3">Veuillez vous connecter et lancer un scan.</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        var socket = io();

        function connect() {
            const port = document.getElementById("portSelect").value;
            fetch("/connect", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({port: port})
            });
        }

        function disconnect() {
            fetch("/disconnect", { method: "POST" });
        }

        function startScan() {
            document.getElementById("i2cBody").innerHTML = "<tr><td colspan='3'>Scan en cours sur le bus I2C...</td></tr>";
            fetch("/run_offset", { method: "POST" });
        }

        socket.on('connection_status', function(data) {
            const label = document.getElementById("statusLabel");
            const btn = document.getElementById("scanBtn");
            if(data.status === 'connecté') {
                label.innerHTML = `<span class="status-dot online"></span>Connecté`;
                btn.disabled = false;
            } else {
                label.innerHTML = `<span class="status-dot offline"></span>Déconnecté`;
                btn.disabled = true;
            }
        });

        socket.on('return_offset', function(addresses) {
            const tbody = document.getElementById("i2cBody");
            tbody.innerHTML = ""; 
            if(addresses.length === 0) {
                tbody.innerHTML = "<tr><td colspan='3'>Aucun capteur détecté sur le bus.</td></tr>";
            } else {
                addresses.forEach((addr, index) => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td class="address-found">${addr.toUpperCase()}</td>
                            <td style="color:#2ecc71;">ACTIF</td>
                        </tr>`;
                });
            }
        });
    </script>
</body>
</html>
